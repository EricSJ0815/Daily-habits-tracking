<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日习惯追踪器</title>
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg: #f0f2f7; --card: #fff; --text: #1f2937; --sub: #6b7280;
      --border: #e5e7eb; --primary: #6C63FF; --primary-light: #e9e4ff;
      --primary-hover: #5a52e0; --streak-color: #f97316; --done-text: #aaa;
      --tab-bar: #fff; --tab-border: #eee; --shadow: rgba(108,99,255,.08);
      --shadow-sm: rgba(0,0,0,.05); --rate-low: #c4b5fd; --rate-mid: #8b5cf6;
      --cal-empty: #f0f0f0; --input-bg: #fff; --red: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg:#0f0f13; --card:#1a1a24; --text:#f0f0f0; --sub:#8888aa;
        --border:#2d2d40; --primary:#8b7fff; --primary-light:#2d2650;
        --primary-hover:#7a6fee; --streak-color:#fb923c; --done-text:#555;
        --tab-bar:#1a1a24; --tab-border:#2d2d40; --shadow:rgba(0,0,0,.3);
        --shadow-sm:rgba(0,0,0,.2); --rate-low:#4c3a8c; --rate-mid:#6d4fc7;
        --cal-empty:#2a2a35; --input-bg:#1a1a24;
      }
    }
    [data-theme="dark"] {
      --bg:#0f0f13; --card:#1a1a24; --text:#f0f0f0; --sub:#8888aa;
      --border:#2d2d40; --primary:#8b7fff; --primary-light:#2d2650;
      --primary-hover:#7a6fee; --streak-color:#fb923c; --done-text:#555;
      --tab-bar:#1a1a24; --tab-border:#2d2d40; --shadow:rgba(0,0,0,.3);
      --shadow-sm:rgba(0,0,0,.2); --rate-low:#4c3a8c; --rate-mid:#6d4fc7;
      --cal-empty:#2a2a35; --input-bg:#1a1a24;
    }
    [data-theme="light"] {
      --bg:#f0f2f7; --card:#fff; --text:#1f2937; --sub:#6b7280;
      --border:#e5e7eb; --primary:#6C63FF; --primary-light:#e9e4ff;
      --primary-hover:#5a52e0; --streak-color:#f97316; --done-text:#aaa;
      --tab-bar:#fff; --tab-border:#eee; --shadow:rgba(108,99,255,.08);
      --shadow-sm:rgba(0,0,0,.05); --rate-low:#c4b5fd; --rate-mid:#8b5cf6;
      --cal-empty:#f0f0f0; --input-bg:#fff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 0 80px; color: var(--text); transition: background .3s, color .3s;
    }
    .container { width: 100%; max-width: 480px; padding: 0 16px; }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex; background: var(--tab-bar);
      border-bottom: 1px solid var(--tab-border);
      width: 100%; max-width: 480px;
      position: sticky; top: 0; z-index: 100;
      transition: background .3s;
    }
    .tab-btn {
      flex: 1; padding: 15px 0; font-size: 14px; font-weight: 600;
      color: var(--sub); background: none; border: none; cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s; font-family: inherit;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── Pages ── */
    .page { display: none; padding-top: 20px; }
    .page.active { display: block; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 10px; }
    .header h1 { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }
    .header .date { font-size: 13px; color: var(--sub); margin-top: 3px; }

    /* ── Slogan ── */
    .daily-slogan {
      display: flex; align-items: center; gap: 10px;
      margin: 0 0 14px; color: var(--sub);
    }
    .slogan-line { flex: 1; height: 1px; background: var(--border); }
    .slogan-text { font-size: 12px; font-style: italic; white-space: nowrap; color: var(--sub); }

    /* ── Progress Ring Card ── */
    .progress-ring-card {
      background: var(--card); border-radius: 16px;
      padding: 16px 20px; margin-bottom: 12px;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex; align-items: center; gap: 20px;
    }
    .ring-wrap { flex-shrink: 0; }
    .ring-stats { flex: 1; }
    .ring-stats-title { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
    .ring-stats-done { font-size: 18px; font-weight: 700; color: var(--primary); }
    .ring-stats-todo { font-size: 13px; color: var(--sub); margin-top: 3px; }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 2px 0 10px; margin-bottom: 4px; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0; padding: 5px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      border: 1.5px solid var(--border); background: var(--card);
      cursor: pointer; transition: all .2s; color: var(--sub); font-family: inherit;
    }
    .filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── Category Groups ── */
    .category-group { margin-bottom: 10px; }
    .category-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px 6px; cursor: pointer; user-select: none;
    }
    .category-header-left { display: flex; align-items: center; gap: 8px; }
    .category-arrow { font-size: 11px; color: var(--sub); transition: transform .2s; }
    .category-group.collapsed .category-arrow { transform: rotate(-90deg); }
    .category-name { font-size: 13px; font-weight: 700; color: var(--sub); }
    .category-count { font-size: 12px; color: var(--sub); opacity: .7; }
    .category-body { display: flex; flex-direction: column; gap: 8px; }
    .category-group.collapsed .category-body { display: none; }

    /* ── Habit Cards ── */
    .habit-card {
      background: var(--card); border-radius: 14px;
      box-shadow: 0 2px 8px var(--shadow-sm);
      overflow: hidden; transition: box-shadow .2s;
    }
    .habit-card:hover { box-shadow: 0 4px 16px var(--shadow); }
    .habit-row { display: flex; align-items: center; gap: 11px; padding: 13px 14px; }
    .habit-check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border); cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; background: var(--card); position: relative;
    }
    .habit-check:hover { border-color: var(--primary); }
    .habit-card.done .habit-check { background: var(--primary); border-color: var(--primary); }
    .check-icon { display: none; color: #fff; font-size: 13px; font-weight: bold; }
    .habit-card.done .check-icon { display: block; }
    @keyframes checkBounce {
      0% { transform: scale(0.7); } 55% { transform: scale(1.25); } 100% { transform: scale(1); }
    }
    .habit-check.bounce { animation: checkBounce 0.35s cubic-bezier(.36,.07,.19,.97); }

    .habit-name { flex: 1; font-size: 15px; font-weight: 500; transition: color .2s; }
    .habit-card.done .habit-name { text-decoration: line-through; color: var(--done-text); }
    .habit-streak {
      font-size: 12px; color: var(--streak-color); font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .habit-note-btn {
      background: none; border: none; cursor: pointer; font-size: 15px;
      padding: 2px 4px; border-radius: 6px; transition: background .2s;
      flex-shrink: 0; line-height: 1; position: relative;
    }
    .habit-note-btn:hover { background: var(--primary-light); }
    .habit-note-btn .note-dot {
      position: absolute; top: 0; right: 0; width: 7px; height: 7px;
      border-radius: 50%; background: var(--primary); display: none;
    }
    .habit-note-btn.has-note .note-dot { display: block; }
    .habit-delete {
      background: none; border: none; cursor: pointer;
      color: var(--border); font-size: 18px; line-height: 1;
      padding: 2px 4px; border-radius: 6px; transition: color .2s, background .2s;
      opacity: 0; flex-shrink: 0;
    }
    .habit-card:hover .habit-delete { opacity: 1; }
    .habit-delete:hover { color: var(--red); background: #fee2e2; }

    /* ── Note / Expense / Reading Area ── */
    .habit-note-area {
      display: none; padding: 0 14px 12px;
      border-top: 1px solid var(--border);
    }
    .habit-note-area.open { display: block; }
    .note-label { font-size: 12px; color: var(--sub); margin: 10px 0 6px; }
    .note-textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 9px 12px; font-size: 14px; font-family: inherit;
      resize: vertical; min-height: 68px; outline: none;
      transition: border-color .2s; color: var(--text); background: var(--input-bg);
    }
    .note-textarea:focus { border-color: var(--primary); }
    .note-save-btn {
      margin-top: 8px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; padding: 7px 16px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .2s;
    }
    .note-save-btn:hover { background: var(--primary-hover); }

    /* Expense */
    .expense-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .expense-label { font-size: 13px; color: var(--text); white-space: nowrap; }
    .expense-input {
      width: 120px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 12px; font-size: 15px; font-family: inherit; outline: none;
      transition: border-color .2s; background: var(--input-bg); color: var(--text);
    }
    .expense-input:focus { border-color: var(--primary); }
    .expense-monthly { font-size: 12px; color: var(--sub); margin-top: 6px; }
    .expense-monthly span { color: var(--primary); font-weight: 700; }

    /* Reading */
    .reading-row { display: flex; gap: 8px; margin-top: 4px; }
    .book-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 12px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s; background: var(--input-bg); color: var(--text);
    }
    .book-input:focus { border-color: var(--primary); }
    .pages-today-input {
      width: 90px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 8px 10px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s; background: var(--input-bg); color: var(--text);
    }
    .pages-today-input:focus { border-color: var(--primary); }
    .reading-total-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .reading-total-label { font-size: 12px; color: var(--sub); white-space: nowrap; }
    .total-pages-input {
      width: 100px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none;
      transition: border-color .2s; background: var(--input-bg); color: var(--text);
    }
    .total-pages-input:focus { border-color: var(--primary); }
    .reading-progress { margin-top: 10px; }
    .reading-progress-text { font-size: 12px; color: var(--sub); margin-bottom: 5px; }
    .reading-bar-bg {
      background: var(--border); border-radius: 999px; height: 7px; overflow: hidden;
    }
    .reading-bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), #a78bfa);
      transition: width .4s ease;
    }
    .reading-pct { font-size: 11px; color: var(--primary); font-weight: 600; margin-top: 3px; display: block; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 36px 20px; color: var(--sub);
      font-size: 15px; background: var(--card); border-radius: 14px;
      box-shadow: 0 2px 8px var(--shadow-sm); margin-bottom: 12px;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }

    /* ── Add Area ── */
    .add-area {
      background: var(--card); border-radius: 14px;
      padding: 12px 14px; box-shadow: 0 2px 8px var(--shadow-sm);
    }
    .add-row { display: flex; gap: 8px; }
    .add-input {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s; background: var(--input-bg); color: var(--text);
    }
    .add-input:focus { border-color: var(--primary); }
    .add-btn {
      background: var(--primary); color: #fff; border: none; border-radius: 10px;
      padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background .2s, transform .1s; font-family: inherit; white-space: nowrap;
    }
    .add-btn:hover { background: var(--primary-hover); }
    .add-btn:active { transform: scale(.96); }
    .add-cat-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .add-cat-label { font-size: 13px; color: var(--sub); white-space: nowrap; }
    .add-cat-select {
      flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none;
      background: var(--input-bg); cursor: pointer; color: var(--text);
    }

    /* ── All Done Banner ── */
    .all-done-banner {
      display: none;
      background: linear-gradient(135deg, var(--primary), #a78bfa);
      color: #fff; text-align: center; border-radius: 14px;
      padding: 14px; font-size: 15px; font-weight: 600;
      margin-bottom: 12px; box-shadow: 0 4px 16px var(--shadow);
      animation: slideDown .4s ease;
    }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ══════════════════════════════════════
       模版库
    ══════════════════════════════════════ */
    .tpl-header { margin-bottom: 16px; }
    .tpl-header h2 { font-size: 18px; font-weight: 700; color: var(--text); }
    .tpl-header p  { font-size: 13px; color: var(--sub); margin-top: 3px; }
    .sub-tab-bar {
      display: flex; background: var(--card); border-radius: 12px; padding: 4px;
      margin-bottom: 16px; box-shadow: 0 2px 8px var(--shadow-sm);
    }
    .sub-tab-btn {
      flex: 1; padding: 8px 0; font-size: 14px; font-weight: 600;
      color: var(--sub); background: none; border: none; border-radius: 9px;
      cursor: pointer; transition: all .2s; font-family: inherit;
    }
    .sub-tab-btn.active { background: var(--primary); color: #fff; }
    .tpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .tpl-card {
      background: var(--card); border-radius: 16px; padding: 18px 14px;
      cursor: pointer; box-shadow: 0 2px 8px var(--shadow-sm);
      transition: box-shadow .2s, transform .15s;
    }
    .tpl-card:hover { box-shadow: 0 6px 20px var(--shadow); transform: translateY(-2px); }
    .tpl-emoji { font-size: 28px; margin-bottom: 8px; }
    .tpl-name  { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
    .tpl-days  { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 6px; }
    .tpl-desc  { font-size: 12px; color: var(--sub); line-height: 1.5; }
    .tpl-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.4); z-index: 300; align-items: flex-end; justify-content: center;
    }
    .tpl-overlay.open { display: flex; }
    .tpl-panel {
      background: var(--card); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px; max-height: 80vh;
      display: flex; flex-direction: column; animation: slideUp .3s ease;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .tpl-panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 20px 12px; flex-shrink: 0; border-bottom: 1px solid var(--border);
    }
    .tpl-panel-title-wrap .tpl-panel-title { font-size: 17px; font-weight: 700; color: var(--text); }
    .tpl-panel-title-wrap .tpl-panel-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
    .tpl-close-btn {
      background: var(--border); border: none; border-radius: 50%;
      width: 30px; height: 30px; cursor: pointer; font-size: 16px;
      line-height: 30px; text-align: center; color: var(--text);
    }
    .tpl-habit-list { overflow-y: auto; padding: 12px 20px; flex: 1; }
    .tpl-habit-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 0; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .tpl-habit-item:last-child { border-bottom: none; }
    .tpl-cb {
      width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .tpl-habit-item.selected .tpl-cb { background: var(--primary); border-color: var(--primary); }
    .tpl-cb-icon { display: none; color: #fff; font-size: 12px; font-weight: bold; }
    .tpl-habit-item.selected .tpl-cb-icon { display: block; }
    .tpl-habit-name { font-size: 14px; color: var(--text); }
    .tpl-panel-foot {
      padding: 12px 20px 28px; display: flex; gap: 10px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .tpl-toggle-all {
      background: var(--border); color: var(--text); border: none; border-radius: 10px;
      padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; white-space: nowrap;
    }
    .tpl-import-btn {
      flex: 1; background: var(--primary); color: #fff; border: none;
      border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .tpl-import-btn:hover { background: var(--primary-hover); }

    /* ══════════════════════════════════════
       我的页面
    ══════════════════════════════════════ */
    .my-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 16px;
    }
    .my-header h2 { font-size: 18px; font-weight: 700; color: var(--text); }
    .my-header p  { font-size: 13px; color: var(--sub); margin-top: 3px; }
    .theme-toggle-btn {
      background: var(--primary-light); border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s; flex-shrink: 0;
    }

    /* Stats Row */
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-card {
      flex: 1; background: var(--card); border-radius: 14px;
      padding: 16px 12px; text-align: center; box-shadow: 0 2px 8px var(--shadow-sm);
    }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--sub); margin-top: 4px; }

    /* Streak Card */
    .my-section-card {
      background: var(--card); border-radius: 16px; padding: 18px;
      margin-bottom: 14px; box-shadow: 0 2px 12px var(--shadow-sm);
    }
    .my-section-title {
      font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--text);
    }
    .section-empty { font-size: 13px; color: var(--sub); text-align: center; padding: 12px 0; }
    .streak-card-body { display: flex; gap: 12px; align-items: stretch; }
    .streak-col { flex: 1; }
    .streak-divider { width: 1px; background: var(--border); flex-shrink: 0; }
    .streak-label { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
    .streak-value { font-size: 28px; font-weight: 700; color: var(--primary); line-height: 1; margin-bottom: 8px; }
    .streak-unit { font-size: 14px; font-weight: 400; color: var(--sub); margin-left: 2px; }
    .streak-bar-bg { background: var(--border); border-radius: 999px; height: 7px; overflow: hidden; margin-bottom: 6px; }
    .streak-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #a78bfa, var(--primary)); transition: width .5s ease; }
    .streak-bar-fill.current { background: linear-gradient(90deg, var(--primary), #f97316); }
    .streak-col.new-record .streak-value { color: #f59e0b; }
    .new-record-badge { font-size: 12px; color: #f59e0b; font-weight: 600; }

    /* Chart Card */
    .chart-legend { display: flex; gap: 16px; margin-top: 8px; justify-content: flex-end; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--sub); }

    /* Calendar */
    .calendar-card {
      background: var(--card); border-radius: 16px; padding: 18px;
      margin-bottom: 14px; box-shadow: 0 2px 12px var(--shadow);
      overflow-x: auto;
    }
    .calendar-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .cal-grid { display: flex; gap: 4px; }
    .cal-week { display: flex; flex-direction: column; gap: 4px; }
    .cal-day {
      width: 13px; height: 13px; border-radius: 3px; cursor: pointer;
      transition: transform .1s; background: var(--cal-empty);
    }
    .cal-day:hover { transform: scale(1.3); }
    .cal-day.rate-low  { background: var(--rate-low); }
    .cal-day.rate-mid  { background: var(--rate-mid); }
    .cal-day.rate-full { background: var(--primary); }
    .cal-day.today-cell { outline: 2px solid var(--streak-color); outline-offset: 1px; }
    .cal-legend {
      display: flex; align-items: center; gap: 5px;

const DEFAULT_CATEGORIES = ['健康', '学习', '社交', '工作', '生活'];
const STORAGE_KEY = 'habit_tracker_v2';

// ═══════════════════════════════════════════════
// Utils
// ═══════════════════════════════════════════════
function dateStr(d) {
  d = d || new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr()     { return dateStr(); }
function yesterdayStr() { const d = new Date(); d.setDate(d.getDate()-1); return dateStr(d); }
function escapeHtml(s)  {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════
// Data Layer
// ═══════════════════════════════════════════════
function loadData()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function initData() {
  const raw = loadData();
  return {
    habits:       (raw.habits || []).map(h => ({ bestStreak: 0, ...h })),
    categories:   raw.categories   || [...DEFAULT_CATEGORIES],
    records:      raw.records      || {},
    notes:        raw.notes        || {},
    expenses:     raw.expenses     || {},
    expenseBudget: raw.expenseBudget || 0,
    readingLogs:  raw.readingLogs  || {},
    readingBooks: raw.readingBooks || {},
    lastVisit:    raw.lastVisit    || todayStr(),
    lastSummaryMonth: raw.lastSummaryMonth || ''
  };
}

function checkDayReset(data) {
  const today = todayStr();
  if (data.lastVisit === today) return data;

  const ydayRec = data.records[yesterdayStr()] || {};
  data.habits = data.habits.map(h => {
    const newStreak = ydayRec[h.id] ? (h.streak || 0) + 1 : 0;
    return { ...h, streak: newStreak, bestStreak: Math.max(h.bestStreak || 0, newStreak) };
  });

  // Detect month change for summary
  const lastMonth = (data.lastVisit || '').slice(0, 7);
  const thisMonth = today.slice(0, 7);
  if (lastMonth && lastMonth !== thisMonth && lastMonth !== data.lastSummaryMonth) {
    data.pendingSummaryMonth = lastMonth;
  }

  // Prune to 90 days
  [data.records, data.notes, data.expenses, data.readingLogs].forEach(obj => {
    const keys = Object.keys(obj).sort();
    while (keys.length > 90) { delete obj[keys.shift()]; }
  });

  data.lastVisit = today;
  if (!data.records[today]) data.records[today] = {};
  saveData(data);
  return data;
}

function toggleHabit(id) {
  const checkEl = document.querySelector(`[data-action="check"][data-id="${id}"]`);
  const today = todayStr();
  if (!appData.records[today]) appData.records[today] = {};
  const wasChecked = !!appData.records[today][id];
  appData.records[today][id] = !wasChecked;
  if (!appData.records[today][id]) delete appData.records[today][id];
  saveData(appData);

  if (!wasChecked && checkEl) fireCheckParticles(checkEl);
  render();

  if (!wasChecked) {
    const newCheckEl = document.querySelector(`[data-action="check"][data-id="${id}"]`);
    if (newCheckEl) {
      newCheckEl.classList.add('bounce');
      setTimeout(() => newCheckEl.classList.remove('bounce'), 400);
    }
  }
}

function addHabit(name, category, type) {
  name = (name || '').trim();
  if (!name) return;
  category = category || '生活';
  type     = type || 'normal';
  if (type === 'expense' && !appData.expenseBudget) {
    const b = prompt('设置本月预算（元），填 0 跳过：');
    const v = parseFloat(b);
    if (!isNaN(v) && v > 0) { appData.expenseBudget = v; }
  }
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  appData.habits.push({ id, name, streak: 0, bestStreak: 0, category, type });
  saveData(appData);
  render();
}

function deleteHabit(id) {
  appData.habits = appData.habits.filter(h => h.id !== id);
  Object.values(appData.records).forEach(r    => delete r[id]);
  Object.values(appData.notes).forEach(r      => delete r[id]);
  Object.values(appData.readingLogs).forEach(r => delete r[id]);
  saveData(appData);
  render();
}

function saveNote(id) {
  const today = todayStr();
  const ta    = document.querySelector(`[data-note-input="${id}"]`);
  if (!ta) return;
  if (!appData.notes[today]) appData.notes[today] = {};
  const text = ta.value.trim();
  if (text) appData.notes[today][id] = text;
  else delete appData.notes[today][id];

  // Expense
  const expInput = document.querySelector(`[data-expense-input="${id}"]`);
  if (expInput) {
    const val = parseFloat(expInput.value);
    if (!isNaN(val) && val >= 0) appData.expenses[today] = val;
    else delete appData.expenses[today];
  }

  // Reading
  const bookInput       = document.querySelector(`[data-book-input="${id}"]`);
  const pagesInput      = document.querySelector(`[data-pages-input="${id}"]`);
  const totalPagesInput = document.querySelector(`[data-total-pages-input="${id}"]`);
  if (bookInput && pagesInput) {
    const book  = bookInput.value.trim();
    const pages = parseInt(pagesInput.value) || 0;
    if (book && pages > 0) {
      if (!appData.readingLogs[today]) appData.readingLogs[today] = {};
      appData.readingLogs[today][id] = { book, pages };
      if (totalPagesInput) {
        const tp = parseInt(totalPagesInput.value) || 0;
        if (tp > 0) {
          if (!appData.readingBooks[book]) appData.readingBooks[book] = {};
          appData.readingBooks[book].totalPages = tp;
        }
      }
    }
  }

  saveData(appData);
  render();
  showToast('已保存 ✓');
}

function toggleNoteArea(id) {
  const area = document.querySelector(`[data-note-area="${id}"]`);
  if (area) area.classList.toggle('open');
}

function getMonthlyExpense(prefix) {
  prefix = prefix || todayStr().slice(0, 7);
  return Object.entries(appData.expenses)
    .filter(([k]) => k.startsWith(prefix))
    .reduce((s, [, v]) => s + (parseFloat(v) || 0), 0);
}

function renderCompletionChart() {
  const container = document.getElementById('chart-container');
  if (!container) return;
  const total = appData.habits.length;
  if (total === 0) {
    container.innerHTML = '<div class="section-empty">添加习惯后开始记录趋势 📊</div>';
    return;
  }

  const today     = new Date();
  const todayKey  = dateStr(today);
  const dow       = today.getDay();
  const monday    = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));

  const thisWeekDates = Array.from({length: 7}, (_, i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i); return dateStr(d);
  });
  const lastWeekDates = thisWeekDates.map(d => {
    const dt = new Date(d + 'T00:00:00'); dt.setDate(dt.getDate() - 7); return dateStr(dt);
  });

  function getRate(dateKey) {
    if (dateKey > todayKey) return null;
    const rec  = appData.records[dateKey] || {};
    const done = appData.habits.filter(h => rec[h.id]).length;
    return done / total;
  }

  const tw = thisWeekDates.map(getRate);
  const lw = lastWeekDates.map(getRate);

  const W = 300, H = 110, pL = 30, pR = 10, pT = 10, pB = 30;
  const cW = W - pL - pR, cH = H - pT - pB;
  const xs = cW / 6;
  const xp = i => pL + i * xs;
  const yp = r => pT + (1 - r) * cH;

  function polyline(rates) {
    return rates.map((r, i) => r !== null ? `${xp(i).toFixed(1)},${yp(r).toFixed(1)}` : null)
      .filter(Boolean).join(' ');
  }
  function dots(rates, color) {
    return rates.map((r, i) => r !== null
      ? `<circle cx="${xp(i).toFixed(1)}" cy="${yp(r).toFixed(1)}" r="3.5" fill="${color}"/>`
      : '').join('');
  }

  const labels = ['一','二','三','四','五','六','日'];
  const gridLines = [0, 0.5, 1].map(r =>
    `<line x1="${pL}" y1="${yp(r).toFixed(1)}" x2="${W-pR}" y2="${yp(r).toFixed(1)}"
           stroke="var(--border)" stroke-width="1"/>`
  ).join('');

  const svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible;display:block">
    ${gridLines}
    <polyline points="${polyline(lw)}" fill="none" stroke="var(--sub)" stroke-width="2"
              stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots(lw, 'var(--sub)')}
    <polyline points="${polyline(tw)}" fill="none" stroke="var(--primary)" stroke-width="2.5"
              stroke-linejoin="round" stroke-linecap="round"/>
    ${dots(tw, 'var(--primary)')}
    ${labels.map((l, i) =>
      `<text x="${xp(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="10" fill="var(--sub)">周${l}</text>`
    ).join('')}
    ${[0, 50, 100].map(v =>
      `<text x="${pL-4}" y="${yp(v/100)+4}" text-anchor="end" font-size="9" fill="var(--sub)">${v}%</text>`
    ).join('')}
  </svg>`;

  const legend = `<div class="chart-legend">
    <span class="legend-item">
      <svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--primary)" stroke-width="2.5"/><circle cx="11" cy="5" r="3" fill="var(--primary)"/></svg>本周
    </span>
    <span class="legend-item">
      <svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--sub)" stroke-width="2" stroke-dasharray="5 3"/><circle cx="11" cy="5" r="3" fill="var(--sub)"/></svg>上周
    </span>
  </div>`;

  container.innerHTML = svg + legend;
}

function renderCalendar() {
  const container = document.getElementById('calendar-container');
  container.innerHTML = '';
  const today    = new Date();
  const todayKey = dateStr(today);
  const total    = appData.habits.length;
  const start    = new Date(today);
  start.setDate(start.getDate() - 89);
  start.setDate(start.getDate() - start.getDay());
  const cur = new Date(start);
  while (cur <= today) {
    const week = document.createElement('div');
    week.className = 'cal-week';
    for (let i = 0; i < 7; i++) {
      const key  = dateStr(cur);
      const cell = document.createElement('div');
      cell.className = 'cal-day';
      cell.dataset.date = key;
      cell.title = key;
      if (cur <= today) {
        const rec  = appData.records[key] || {};
        const done = Object.values(rec).filter(Boolean).length;
        if (total > 0 && done > 0) {
          const rate = done / total;
          cell.classList.add(rate >= 1 ? 'rate-full' : rate >= .5 ? 'rate-mid' : 'rate-low');
        }
      } else { cell.style.opacity = '0'; cell.style.pointerEvents = 'none'; }
      if (key === todayKey) cell.classList.add('today-cell');
      week.appendChild(cell);
      cur.setDate(cur.getDate() + 1);
    }
    container.appendChild(week);
  }
}

function renderReadingSummary() {
  const section = document.getElementById('reading-summary-section');
  if (!section) return;
  const hasReading = appData.habits.some(h => h.type === 'reading');
  if (!hasReading) { section.innerHTML = ''; return; }

  const prefix = todayStr().slice(0, 7);
  const bookPages = {};
  Object.entries(appData.readingLogs).forEach(([date, dayLogs]) => {
    if (!date.startsWith(prefix)) return;
    Object.values(dayLogs).forEach(log => {
      if (log && log.book) bookPages[log.book] = (bookPages[log.book] || 0) + (log.pages || 0);
    });
  });

  const bookList   = Object.entries(bookPages);
  const totalPages = bookList.reduce((s, [, p]) => s + p, 0);

  let inner = '';
  if (bookList.length === 0) {
    inner = `<div class="section-empty">本月还没有阅读记录，快去打卡吧 📖</div>`;
  } else {
    inner = `<div class="reading-stats-row">
      <span>共读 <b>${bookList.length}</b> 本书</span>
      <span>累计 <b>${totalPages}</b> 页</span>
    </div>`;
    bookList.forEach(([book, pages]) => {
      const tp  = (appData.readingBooks[book] || {}).totalPages || 0;
      const pct = tp > 0 ? Math.min(100, Math.round(pages / tp * 100)) : 0;
      inner += `<div class="book-progress-item">
        <div class="book-progress-header">
          <span class="book-name">📖 ${escapeHtml(book)}</span>
          <span class="book-pages">${pages}页${tp ? ` / ${tp}页` : ''}</span>
        </div>
        ${tp > 0 ? `<div class="reading-bar-bg"><div class="reading-bar-fill" style="width:${pct}%"></div></div>` : ''}
      </div>`;
    });
  }

  section.innerHTML = `<div class="my-section-card">
    <div class="my-section-title">📚 本月阅读</div>
    ${inner}
  </div>`;
}

function renderExpenseSummary() {
  const section = document.getElementById('expense-summary-section');
  if (!section) return;
  const hasExpense = appData.habits.some(h => h.type === 'expense');
  if (!hasExpense) { section.innerHTML = ''; return; }

  const prefix    = todayStr().slice(0, 7);
  const spent     = getMonthlyExpense(prefix);
  const budget    = appData.expenseBudget || 0;
  const pct       = budget > 0 ? Math.min(100, Math.round(spent / budget * 100)) : 0;
  const over      = budget > 0 && spent > budget;
  const remaining = budget - spent;
  const recordDays = Object.keys(appData.expenses).filter(k => k.startsWith(prefix)).length;

  const barHtml = budget > 0 ? `
    <div class="expense-bar-bg">
      <div class="expense-bar-fill${over ? ' over' : ''}" style="width:${pct}%"></div>
    </div>
    <div class="expense-detail-row">
      <span>${over ? `⚠️ 已超支 ¥${Math.abs(remaining).toFixed(0)}` : `还剩 ¥${remaining.toFixed(0)}`}</span>
      <span>已记录 ${recordDays} 天</span>
    </div>` : `<div class="expense-detail-row"><span>已记录 ${recordDays} 天</span></div>`;

  section.innerHTML = `<div class="my-section-card">
    <div class="my-section-title">💰 本月记账</div>
    <div class="expense-summary-inner">
      <div class="expense-amount-row">
        <span class="expense-spent">¥${spent.toFixed(0)}</span>
        <span class="expense-budget-label">${budget > 0 ? ` / ¥${budget.toFixed(0)} 预算` : ' 本月支出'}</span>
      </div>
      ${barHtml}
      <button class="budget-btn" onclick="promptBudget()">${budget > 0 ? '修改预算' : '设置预算'}</button>
    </div>
  </div>`;
}

function promptBudget() {
  const cur   = appData.expenseBudget || '';
  const input = prompt(`请输入本月预算（元）：`, cur);
  if (input === null) return;
  const val = parseFloat(input);
  if (!isNaN(val) && val >= 0) {
    appData.expenseBudget = val;
    saveData(appData);
    renderExpenseSummary();
  }
}

// ═══════════════════════════════════════════════
// Monthly Summary
// ═══════════════════════════════════════════════
function buildMonthlySummary(yearMonth) {
  const monthRecords = Object.entries(appData.records).filter(([d]) => d.startsWith(yearMonth));
  let totalCheckIns = 0;
  const completedDays = new Set();
  monthRecords.forEach(([date, rec]) => {
    const done = Object.values(rec).filter(Boolean).length;
    totalCheckIns += done;
    if (done > 0) completedDays.add(date);
  });
  const avgPerDay = completedDays.size > 0 ? (totalCheckIns / completedDays.size).toFixed(1) : '0.0';
  const maxStreak = appData.habits.reduce((m, h) => Math.max(m, h.bestStreak || 0), 0);

  const bookPages = {};
  Object.entries(appData.readingLogs || {}).forEach(([date, dl]) => {
    if (!date.startsWith(yearMonth)) return;
    Object.values(dl).forEach(log => {
      if (log && log.book) bookPages[log.book] = (bookPages[log.book] || 0) + (log.pages || 0);
    });
  });
  const readingBooks = Object.keys(bookPages).length;
  const readingPages = Object.values(bookPages).reduce((s, p) => s + p, 0);
  const monthSpent   = getMonthlyExpense(yearMonth);
  const hasReading   = appData.habits.some(h => h.type === 'reading') && readingPages > 0;
  const hasExpense   = appData.habits.some(h => h.type === 'expense') && monthSpent > 0;

  return { yearMonth, totalCheckIns, completedDays: completedDays.size, avgPerDay, maxStreak,
           readingBooks, readingPages, monthSpent, hasReading, hasExpense };
}

function showMonthlySummary(yearMonth) {
  const s  = buildMonthlySummary(yearMonth);
  const [y, m] = yearMonth.split('-');
  document.getElementById('summary-body').innerHTML = `
    <div class="summary-gradient-card">
      <div class="summary-month-title">📅 ${y}年${parseInt(m)}月 · 月度总结</div>
      <div class="summary-items">
        <div class="summary-item">✅ 累计打卡 <b>${s.totalCheckIns}</b> 次</div>
        <div class="summary-item">📆 共 <b>${s.completedDays}</b> 天有记录，平均每天 <b>${s.avgPerDay}</b> 次</div>
        <div class="summary-item">🔥 最长连续 <b>${s.maxStreak}</b> 天</div>
        ${s.hasReading ? `<div class="summary-item">📚 阅读 <b>${s.readingBooks}</b> 本，累计 <b>${s.readingPages}</b> 页</div>` : ''}
        ${s.hasExpense ? `<div class="summary-item">💰 本月支出 <b>¥${s.monthSpent.toFixed(0)}</b>${appData.expenseBudget ? ` / ¥${appData.expenseBudget} 预算` : ''}</div>` : ''}
      </div>
    </div>
  `;
  document.getElementById('summary-overlay').classList.add('open');
}

// ═══════════════════════════════════════════════
// Day Detail
// ═══════════════════════════════════════════════
function openDayDetail(dateKey) {
  const rec   = appData.records[dateKey]  || {};
  const notes = appData.notes[dateKey]    || {};
  const rLogs = appData.readingLogs[dateKey] || {};
  const d     = new Date(dateKey + 'T00:00:00');
  const days  = ['日','一','二','三','四','五','六'];
  document.getElementById('day-detail-title').textContent =
    `${d.getMonth()+1}月${d.getDate()}日 星期${days[d.getDay()]}`;
  const body = document.getElementById('day-detail-body');
  if (appData.habits.length === 0) {
    body.innerHTML = '<div style="color:var(--sub);text-align:center;padding:20px">暂无习惯数据</div>';
  } else {
    body.innerHTML = appData.habits.map(h => {
      const done   = !!rec[h.id];
      const note   = notes[h.id] || '';
      const rLog   = rLogs[h.id];
      const expStr = h.type === 'expense' && appData.expenses[dateKey]
        ? `💰 支出 ¥${parseFloat(appData.expenses[dateKey]).toFixed(2)}` : '';
      const readStr = rLog ? `📖 ${escapeHtml(rLog.book)} · ${rLog.pages}页` : '';
      return `<div class="day-detail-item">
        <div class="day-detail-row">
          <span>${done ? '✅' : '⬜'}</span>
          <span class="day-detail-name">${escapeHtml(h.name)}</span>
        </div>
        ${note    ? `<div class="day-detail-note">📝 ${escapeHtml(note)}</div>` : ''}
        ${expStr  ? `<div class="day-detail-note">${expStr}</div>` : ''}
        ${readStr ? `<div class="day-detail-note">${readStr}</div>` : ''}
      </div>`;
    }).join('');
  }
  document.getElementById('day-detail-overlay').classList.add('open');
}

// ═══════════════════════════════════════════════
// Toast & Confetti & Particles
// ═══════════════════════════════════════════════
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#333;color:#fff;padding:10px 20px;border-radius:999px;
      font-size:14px;z-index:9000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

function fireConfetti() {
  const wrapper = document.getElementById('confetti-wrapper');
  wrapper.innerHTML = '';
  const colors = ['#6C63FF','#a78bfa','#f97316','#22c55e','#facc15','#ec4899'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const s = (8 + Math.random() * 6) + 'px';
    el.style.width = s; el.style.height = s;
    el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    el.style.animationDelay   = (Math.random() * .6) + 's';
    wrapper.appendChild(el);
  }
  setTimeout(() => { wrapper.innerHTML = ''; }, 3500);
}

function fireCheckParticles(el) {
  const rect   = el.getBoundingClientRect();
  const cx     = rect.left + rect.width  / 2;
  const cy     = rect.top  + rect.height / 2;
  const colors = ['#6C63FF','#a78bfa','#f97316','#22c55e','#facc15','#ec4899'];
  const wrapper = document.getElementById('confetti-wrapper');
  for (let i = 0; i < 8; i++) {
    const p     = document.createElement('div');
    p.className = 'check-particle';
    const angle = (i / 8) * Math.PI * 2;
    const dist  = 28 + Math.random() * 18;
    p.style.left       = cx + 'px';
    p.style.top        = cy + 'px';
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    wrapper.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

// ═══════════════════════════════════════════════
// Theme
// ═══════════════════════════════════════════════
function toggleTheme() {
  const html    = document.documentElement;
  const current = html.getAttribute('data-theme');
  const sysIsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let next;
  if (!current) { next = sysIsDark ? 'light' : 'dark'; }
  else if (current === 'dark')  { next = 'light'; }
  else { next = null; }

  if (next) {
    html.setAttribute('data-theme', next);
    localStorage.setItem('themeOverride', next);
  } else {
    html.removeAttribute('data-theme');
    localStorage.removeItem('themeOverride');
  }
  updateThemeBtn();
}

function updateThemeBtn() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  const theme   = document.documentElement.getAttribute('data-theme');
  const sysIsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark  = theme === 'dark' || (!theme && sysIsDark);
  btn.textContent = isDark ? '☀️' : '🌙';
}

// ═══════════════════════════════════════════════
// Tab Switch
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  ['today','templates','mine'].forEach(t => {
    document.getElementById('page-' + t).classList.toggle('active', t === tab);
  });
}

// ═══════════════════════════════════════════════
// Category helpers
// ═══════════════════════════════════════════════
function createNewCategory(sel) {
  const name = prompt('请输入新分类名称：');
  if (!name || !name.trim()) { sel.value = appData.categories[0] || '生活'; return; }
  const trimmed = name.trim();
  if (!appData.categories.includes(trimmed)) {
    appData.categories.push(trimmed);
    saveData(appData);
    renderCatSelect();
  }
  document.getElementById('cat-select').value = trimmed;
}

// ═══════════════════════════════════════════════
// Event Listeners
// ═══════════════════════════════════════════════

// Main tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    switchTab(tab);
    if (tab === 'mine')      renderMine();
    if (tab === 'templates') { renderTemplates('challenge'); renderTemplates('scene'); }
  });
});

// Sub tabs
document.querySelectorAll('.sub-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const sub = btn.dataset.sub;
    document.getElementById('tpl-grid-challenge').style.display = sub === 'challenge' ? '' : 'none';
    document.getElementById('tpl-grid-scene').style.display     = sub === 'scene'     ? '' : 'none';
  });
});

// Habit list delegation
document.getElementById('habit-list').addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const { action, id } = el.dataset;
  if      (action === 'check')     toggleHabit(id);
  else if (action === 'delete')    { if (confirm('确认删除这个习惯？')) deleteHabit(id); }
  else if (action === 'note')      toggleNoteArea(id);
  else if (action === 'save-note') saveNote(id);
});

// Category header collapse
document.getElementById('habit-list').addEventListener('click', e => {
  const hdr = e.target.closest('.category-header');
  if (!hdr) return;
  hdr.closest('.category-group').classList.toggle('collapsed');
});

// Filter bar
document.getElementById('filter-bar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  activeFilter = chip.dataset.filter || null;
  render();
});

// Add habit
document.getElementById('add-btn').addEventListener('click', () => {
  const inp = document.getElementById('habit-input');
  const sel = document.getElementById('cat-select');
  const typ = document.getElementById('type-select');
  if (sel.value === '__new__') { createNewCategory(sel); return; }
  addHabit(inp.value, sel.value, typ.value);
  inp.value = ''; inp.focus();
});
document.getElementById('habit-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const sel = document.getElementById('cat-select');
  const typ = document.getElementById('type-select');
  if (sel.value === '__new__') { createNewCategory(sel); return; }
  addHabit(e.target.value, sel.value, typ.value);
  e.target.value = '';
});
document.getElementById('cat-select').addEventListener('change', function() {
  if (this.value === '__new__') createNewCategory(this);
});

// Template modal
document.getElementById('tpl-habit-list').addEventListener('click', e => {
  const item = e.target.closest('.tpl-habit-item');
  if (!item) return;
  item.classList.toggle('selected');
  updateImportBtn();
});
document.getElementById('tpl-toggle-all').addEventListener('click', () => {
  const items  = document.querySelectorAll('.tpl-habit-item');
  const allSel = document.querySelectorAll('.tpl-habit-item.selected').length === items.length;
  items.forEach(item => item.classList.toggle('selected', !allSel));
  updateImportBtn();
});
document.getElementById('tpl-import-btn').addEventListener('click', importSelected);
document.getElementById('tpl-close-btn').addEventListener('click', () => {
  document.getElementById('tpl-overlay').classList.remove('open');
});
document.getElementById('tpl-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('tpl-overlay').classList.remove('open');
});

// Calendar click
document.getElementById('calendar-container').addEventListener('click', e => {
  const cell = e.target.closest('.cal-day');
  if (cell && cell.dataset.date) openDayDetail(cell.dataset.date);
});

// Day detail close
document.getElementById('day-detail-close').addEventListener('click', () => {
  document.getElementById('day-detail-overlay').classList.remove('open');
});
document.getElementById('day-detail-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('day-detail-overlay').classList.remove('open');
});

// Summary modal close
document.getElementById('summary-close-btn').addEventListener('click', () => {
  document.getElementById('summary-overlay').classList.remove('open');
});
document.getElementById('summary-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('summary-overlay').classList.remove('open');
});

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
render();
updateThemeBtn();

// Show pending monthly summary (on month change)
if (appData.pendingSummaryMonth) {
  const monthToShow = appData.pendingSummaryMonth;
  delete appData.pendingSummaryMonth;
  appData.lastSummaryMonth = monthToShow;
  saveData(appData);
  setTimeout(() => showMonthlySummary(monthToShow), 800);
}
