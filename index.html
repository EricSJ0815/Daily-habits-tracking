<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日习惯追踪器</title>
  <style>
    :root {
      --bg:#f0f2f7;--card:#fff;--text:#1f2937;--sub:#6b7280;
      --border:#e5e7eb;--primary:#6C63FF;--primary-light:#e9e4ff;
      --primary-hover:#5a52e0;--streak-color:#f97316;--done-text:#aaa;
      --tab-bar:#fff;--tab-border:#eee;--shadow:rgba(108,99,255,.08);
      --shadow-sm:rgba(0,0,0,.05);--rate-low:#c4b5fd;--rate-mid:#8b5cf6;
      --cal-empty:#f0f0f0;--input-bg:#fff;--red:#ef4444;
    }
    @media (prefers-color-scheme:dark){
      :root:not([data-theme="light"]){
        --bg:#0f0f13;--card:#1a1a24;--text:#f0f0f0;--sub:#8888aa;
        --border:#2d2d40;--primary:#8b7fff;--primary-light:#2d2650;
        --primary-hover:#7a6fee;--streak-color:#fb923c;--done-text:#555;
        --tab-bar:#1a1a24;--tab-border:#2d2d40;--shadow:rgba(0,0,0,.3);
        --shadow-sm:rgba(0,0,0,.2);--rate-low:#4c3a8c;--rate-mid:#6d4fc7;
        --cal-empty:#2a2a35;--input-bg:#1a1a24;
      }
    }
    [data-theme="dark"]{--bg:#0f0f13;--card:#1a1a24;--text:#f0f0f0;--sub:#8888aa;--border:#2d2d40;--primary:#8b7fff;--primary-light:#2d2650;--primary-hover:#7a6fee;--streak-color:#fb923c;--done-text:#555;--tab-bar:#1a1a24;--tab-border:#2d2d40;--shadow:rgba(0,0,0,.3);--shadow-sm:rgba(0,0,0,.2);--rate-low:#4c3a8c;--rate-mid:#6d4fc7;--cal-empty:#2a2a35;--input-bg:#1a1a24;}
    [data-theme="light"]{--bg:#f0f2f7;--card:#fff;--text:#1f2937;--sub:#6b7280;--border:#e5e7eb;--primary:#6C63FF;--primary-light:#e9e4ff;--primary-hover:#5a52e0;--streak-color:#f97316;--done-text:#aaa;--tab-bar:#fff;--tab-border:#eee;--shadow:rgba(108,99,255,.08);--shadow-sm:rgba(0,0,0,.05);--rate-low:#c4b5fd;--rate-mid:#8b5cf6;--cal-empty:#f0f0f0;--input-bg:#fff;}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px;color:var(--text);transition:background .3s,color .3s}
    .container{width:100%;max-width:480px;padding:0 16px}

    /* Tab */
    .tab-bar{display:flex;background:var(--tab-bar);border-bottom:1px solid var(--tab-border);width:100%;max-width:480px;position:sticky;top:0;z-index:100;transition:background .3s}
    .tab-btn{flex:1;padding:15px 0;font-size:14px;font-weight:600;color:var(--sub);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;font-family:inherit}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
    .page{display:none;padding-top:20px}.page.active{display:block}

    /* Header */
    .header{text-align:center;margin-bottom:10px}
    .header h1{font-size:20px;font-weight:700;color:var(--primary);letter-spacing:1px}
    .header .date{font-size:13px;color:var(--sub);margin-top:3px}
    .daily-slogan{display:flex;align-items:center;gap:10px;margin:0 0 14px;color:var(--sub)}
    .slogan-line{flex:1;height:1px;background:var(--border)}
    .slogan-text{font-size:12px;font-style:italic;white-space:nowrap;color:var(--sub)}

    /* Progress Ring */
    .progress-ring-card{background:var(--card);border-radius:16px;padding:16px 20px;margin-bottom:12px;box-shadow:0 2px 12px var(--shadow);display:flex;align-items:center;gap:20px}
    .ring-wrap{flex-shrink:0}
    .ring-stats{flex:1}
    .ring-stats-title{font-size:12px;color:var(--sub);margin-bottom:6px}
    .ring-stats-done{font-size:18px;font-weight:700;color:var(--primary)}
    .ring-stats-todo{font-size:13px;color:var(--sub);margin-top:3px}

    /* Filter */
    .filter-bar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;margin-bottom:4px;scrollbar-width:none}
    .filter-bar::-webkit-scrollbar{display:none}
    .filter-chip{flex-shrink:0;padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;color:var(--sub);font-family:inherit}
    .filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

    /* Category groups */
    .category-group{margin-bottom:10px}
    .category-header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 6px;cursor:pointer;user-select:none}
    .category-header-left{display:flex;align-items:center;gap:8px}
    .category-arrow{font-size:11px;color:var(--sub);transition:transform .2s}
    .category-group.collapsed .category-arrow{transform:rotate(-90deg)}
    .category-name{font-size:13px;font-weight:700;color:var(--sub)}
    .category-count{font-size:12px;color:var(--sub);opacity:.7}
    .category-body{display:flex;flex-direction:column;gap:8px}
    .category-group.collapsed .category-body{display:none}

    /* Habit cards */
    .habit-card{background:var(--card);border-radius:14px;box-shadow:0 2px 8px var(--shadow-sm);overflow:hidden;transition:box-shadow .2s}
    .habit-card:hover{box-shadow:0 4px 16px var(--shadow)}
    .habit-row{display:flex;align-items:center;gap:11px;padding:13px 14px}
    .habit-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:var(--card)}
    .habit-check:hover{border-color:var(--primary)}
    .habit-card.done .habit-check{background:var(--primary);border-color:var(--primary)}
    .check-icon{display:none;color:#fff;font-size:13px;font-weight:bold}
    .habit-card.done .check-icon{display:block}
    @keyframes checkBounce{0%{transform:scale(0.7)}55%{transform:scale(1.25)}100%{transform:scale(1)}}
    .habit-check.bounce{animation:checkBounce .35s cubic-bezier(.36,.07,.19,.97)}
    .habit-name{flex:1;font-size:15px;font-weight:500;transition:color .2s}
    .habit-card.done .habit-name{text-decoration:line-through;color:var(--done-text)}
    .habit-streak{font-size:12px;color:var(--streak-color);font-weight:600;white-space:nowrap;flex-shrink:0}
    .habit-note-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px;border-radius:6px;transition:background .2s;flex-shrink:0;line-height:1;position:relative}
    .habit-note-btn:hover{background:var(--primary-light)}
    .note-dot{position:absolute;top:0;right:0;width:7px;height:7px;border-radius:50%;background:var(--primary);display:none}
    .habit-note-btn.has-note .note-dot{display:block}
    .habit-delete{background:none;border:none;cursor:pointer;color:var(--border);font-size:18px;line-height:1;padding:2px 4px;border-radius:6px;transition:color .2s,background .2s;opacity:0;flex-shrink:0}
    .habit-card:hover .habit-delete{opacity:1}
    .habit-delete:hover{color:var(--red);background:#fee2e2}

    /* Challenge info row */
    .challenge-info-row{display:flex;align-items:center;gap:10px;padding:6px 14px;background:rgba(108,99,255,.04);border-top:1px solid var(--border)}
    .day-badge{font-size:12px;font-weight:600;color:#f97316;background:rgba(249,115,22,.1);border-radius:999px;padding:3px 10px;flex-shrink:0}
    .day-badge.complete{color:#f59e0b;background:rgba(245,158,11,.12)}
    .restart-link-btn,.cert-link-btn{font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;padding:3px 8px;border-radius:999px;font-family:inherit;transition:background .2s}
    .restart-link-btn{color:var(--sub)}.restart-link-btn:hover{background:var(--border)}
    .cert-link-btn{color:var(--primary)}.cert-link-btn:hover{background:var(--primary-light)}

    /* Note area */
    .habit-note-area{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
    .habit-note-area.open{display:block}
    .note-label{font-size:12px;color:var(--sub);margin:10px 0 6px}
    .note-textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;resize:vertical;min-height:68px;outline:none;transition:border-color .2s;color:var(--text);background:var(--input-bg)}
    .note-textarea:focus{border-color:var(--primary)}
    .note-save-btn{margin-top:8px;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
    .note-save-btn:hover{background:var(--primary-hover)}
    .expense-row{display:flex;align-items:center;gap:10px;margin-top:10px}
    .expense-label{font-size:13px;color:var(--text);white-space:nowrap}
    .expense-input{width:120px;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--input-bg);color:var(--text)}
    .expense-input:focus{border-color:var(--primary)}
    .expense-monthly{font-size:12px;color:var(--sub);margin-top:6px}
    .expense-monthly span{color:var(--primary);font-weight:700}

    /* Empty / Add */
    .empty-state{text-align:center;padding:36px 20px;color:var(--sub);font-size:15px;background:var(--card);border-radius:14px;box-shadow:0 2px 8px var(--shadow-sm);margin-bottom:12px}
    .empty-state .empty-icon{font-size:36px;margin-bottom:10px}
    .add-area{background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:0 2px 8px var(--shadow-sm)}
    .add-row{display:flex;gap:8px}
    .add-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--input-bg);color:var(--text)}
    .add-input:focus{border-color:var(--primary)}
    .add-btn{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s;font-family:inherit;white-space:nowrap}
    .add-btn:hover{background:var(--primary-hover)}.add-btn:active{transform:scale(.96)}
    .add-cat-row{display:flex;align-items:center;gap:8px;margin-top:8px}
    .add-cat-label{font-size:13px;color:var(--sub);white-space:nowrap}
    .add-cat-select{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;background:var(--input-bg);cursor:pointer;color:var(--text)}

    /* All done */
    .all-done-banner{display:none;background:linear-gradient(135deg,var(--primary),#a78bfa);color:#fff;text-align:center;border-radius:14px;padding:14px;font-size:15px;font-weight:600;margin-bottom:12px;box-shadow:0 4px 16px var(--shadow);animation:slideDown .4s ease}
    @keyframes slideDown{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* Templates */
    .tpl-header{margin-bottom:16px}
    .tpl-header h2{font-size:18px;font-weight:700;color:var(--text)}
    .tpl-header p{font-size:13px;color:var(--sub);margin-top:3px}
    .sub-tab-bar{display:flex;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;box-shadow:0 2px 8px var(--shadow-sm)}
    .sub-tab-btn{flex:1;padding:8px 0;font-size:14px;font-weight:600;color:var(--sub);background:none;border:none;border-radius:9px;cursor:pointer;transition:all .2s;font-family:inherit}
    .sub-tab-btn.active{background:var(--primary);color:#fff}
    .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .tpl-card{background:var(--card);border-radius:16px;padding:18px 14px;cursor:pointer;box-shadow:0 2px 8px var(--shadow-sm);transition:box-shadow .2s,transform .15s}
    .tpl-card:hover{box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px)}
    .tpl-emoji{font-size:28px;margin-bottom:8px}
    .tpl-name{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
    .tpl-days{font-size:12px;color:var(--primary);font-weight:600;margin-bottom:6px}
    .tpl-desc{font-size:12px;color:var(--sub);line-height:1.5}
    .tpl-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end;justify-content:center}
    .tpl-overlay.open{display:flex}
    .tpl-panel{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
    .tpl-panel-head{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px;flex-shrink:0;border-bottom:1px solid var(--border)}
    .tpl-panel-title{font-size:17px;font-weight:700;color:var(--text)}
    .tpl-panel-meta{font-size:12px;color:var(--sub);margin-top:2px}
    .tpl-close-btn{background:var(--border);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:30px;text-align:center;color:var(--text)}
    .tpl-habit-list{overflow-y:auto;padding:12px 20px;flex:1}
    .tpl-habit-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
    .tpl-habit-item:last-child{border-bottom:none}
    .tpl-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .tpl-habit-item.selected .tpl-cb{background:var(--primary);border-color:var(--primary)}
    .tpl-cb-icon{display:none;color:#fff;font-size:12px;font-weight:bold}
    .tpl-habit-item.selected .tpl-cb-icon{display:block}
    .tpl-habit-name{font-size:14px;color:var(--text)}
    .tpl-panel-foot{padding:12px 20px 28px;display:flex;gap:10px;border-top:1px solid var(--border);flex-shrink:0}
    .tpl-toggle-all{background:var(--border);color:var(--text);border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
    .tpl-import-btn{flex:1;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
    .tpl-import-btn:hover{background:var(--primary-hover)}

    /* ── Pledge Overlay ── */
    .pledge-overlay{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#1a0a2e,#2d1b69,#0f1a3d);z-index:500;align-items:center;justify-content:center;padding:20px}
    .pledge-overlay.open{display:flex}
    .pledge-card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:32px 24px;text-align:center;color:#fff;max-width:420px;width:100%;animation:summaryPop .4s cubic-bezier(.34,1.56,.64,1)}
    .pledge-big-emoji{font-size:60px;margin-bottom:14px;filter:drop-shadow(0 0 20px rgba(167,139,250,.6))}
    .pledge-challenge-name{font-size:24px;font-weight:700;margin-bottom:4px}
    .pledge-duration{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:20px}
    .pledge-habits-preview{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px}
    .pledge-habit-chip{background:rgba(255,255,255,.1);border-radius:999px;padding:4px 12px;font-size:12px;color:rgba(255,255,255,.8)}
    .pledge-oath{background:rgba(255,255,255,.07);border-radius:16px;padding:16px 20px;margin-bottom:24px;text-align:left;border-left:3px solid rgba(167,139,250,.6)}
    .pledge-oath-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:10px;letter-spacing:1px}
    .pledge-oath-text{font-size:15px;line-height:1.9;color:rgba(255,255,255,.9)}
    .pledge-actions{display:flex;gap:10px;flex-direction:column}
    .pledge-cancel-btn{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:inherit;transition:background .2s}
    .pledge-cancel-btn:hover{background:rgba(255,255,255,.14)}
    .pledge-confirm-btn{background:linear-gradient(135deg,#6C63FF,#a78bfa);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(108,99,255,.5);transition:transform .15s,box-shadow .15s}
    .pledge-confirm-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(108,99,255,.6)}
    .pledge-confirm-btn:active{transform:scale(.97)}

    /* ── Certificate Overlay ── */
    .cert-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;align-items:center;justify-content:center;padding:20px;flex-direction:column}
    .cert-overlay.open{display:flex}
    .cert-close-row{width:100%;max-width:380px;text-align:right;margin-bottom:8px}
    .cert-close-btn{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:#fff;font-size:16px;line-height:32px}
    .cert-card{background:linear-gradient(160deg,#fffbeb,#fff8f0,#fff);border-radius:20px;padding:30px 24px;text-align:center;border:2px solid #f59e0b;box-shadow:0 8px 40px rgba(0,0,0,.4);width:100%;max-width:380px}
    .cert-header-stars{font-size:15px;color:#f59e0b;font-weight:700;margin-bottom:18px;letter-spacing:2px}
    .cert-big-emoji{font-size:54px;margin-bottom:12px}
    .cert-challenge-name{font-size:22px;font-weight:700;color:#1f2937;margin-bottom:2px}
    .cert-sub{font-size:13px;color:#6b7280;margin-bottom:16px}
    .cert-divider{color:#f59e0b;font-size:13px;margin:14px 0;letter-spacing:2px}
    .cert-headline{font-size:16px;font-weight:600;color:#6C63FF;margin-bottom:16px}
    .cert-stats{background:rgba(108,99,255,.06);border-radius:12px;padding:14px 16px;text-align:left;display:flex;flex-direction:column;gap:6px}
    .cert-stat-item{font-size:14px;color:#374151}
    .cert-quote{font-size:13px;font-style:italic;color:#9ca3af;margin-top:16px}
    .cert-issued{font-size:11px;color:#d1d5db;margin-top:6px}
    .cert-share-tip{color:rgba(255,255,255,.6);font-size:13px;margin-top:12px}

    /* My page */
    .my-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
    .my-header h2{font-size:18px;font-weight:700;color:var(--text)}
    .my-header p{font-size:13px;color:var(--sub);margin-top:3px}
    .theme-toggle-btn{background:var(--primary-light);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
    .stats-row{display:flex;gap:10px;margin-bottom:16px}
    .stat-card{flex:1;background:var(--card);border-radius:14px;padding:16px 12px;text-align:center;box-shadow:0 2px 8px var(--shadow-sm)}
    .stat-value{font-size:26px;font-weight:700;color:var(--primary)}
    .stat-label{font-size:12px;color:var(--sub);margin-top:4px}
    .my-section-card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px var(--shadow-sm)}
    .my-section-title{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
    .section-empty{font-size:13px;color:var(--sub);text-align:center;padding:12px 0}
    .streak-card-body{display:flex;gap:12px;align-items:stretch}
    .streak-col{flex:1}
    .streak-divider{width:1px;background:var(--border);flex-shrink:0}
    .streak-label{font-size:12px;color:var(--sub);margin-bottom:6px}
    .streak-value{font-size:28px;font-weight:700;color:var(--primary);line-height:1;margin-bottom:8px}
    .streak-unit{font-size:14px;font-weight:400;color:var(--sub);margin-left:2px}
    .streak-bar-bg{background:var(--border);border-radius:999px;height:7px;overflow:hidden;margin-bottom:6px}
    .streak-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#a78bfa,var(--primary));transition:width .5s ease}
    .streak-bar-fill.current{background:linear-gradient(90deg,var(--primary),#f97316)}
    .streak-col.new-record .streak-value{color:#f59e0b}
    .new-record-badge{font-size:12px;color:#f59e0b;font-weight:600}
    .chart-legend{display:flex;gap:16px;margin-top:8px;justify-content:flex-end}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--sub)}
    .calendar-card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 2px 12px var(--shadow);overflow-x:auto}
    .calendar-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}

<script>
// ── Theme init ──
(function(){const t=localStorage.getItem('themeOverride');if(t)document.documentElement.setAttribute('data-theme',t)})();


const TEMPLATES = {
  challenge:[
    {id:'project50',emoji:'🔥',name:'Project 50',days:'50天',targetDays:50,desc:'50天挑战，培养7项核心习惯，全面提升身心状态',category:'挑战',

    {id:'morning',emoji:'🌅',name:'21天晨间习惯',days:'21天',targetDays:21,desc:'建立属于你的黄金早晨',category:'挑战',
     habits:[{name:'固定时间早起',type:'normal'},{name:'5分钟冥想',type:'normal'},{name:'吃营养早餐',type:'normal'},{name:'阅读晨报/资讯 15分钟',type:'normal'},{name:'写下今日3件最重要的事',type:'normal'}]},
    {id:'reading_marathon',emoji:'📚',name:'读书马拉松',days:'30天',targetDays:30,desc:'30天坚持每天读书1小时，月底读完一本书',category:'挑战',
     habits:[{name:'阅读 1小时',type:'normal'},{name:'记录读书笔记',type:'normal'},{name:'月底完成一本书（打卡确认）',type:'normal'}]},
  ],
  scene:[
    {id:'job_hunt',emoji:'💼',name:'找工作模式',days:'持续',targetDays:0,desc:'系统化求职，每天积累',category:'工作',
     habits:[{name:'投递简历 3份',type:'normal'},{name:'复习1个面试常见问题',type:'normal'},{name:'更新求职平台/简历',type:'normal'},{name:'阅读行业动态 15分钟',type:'normal'},{name:'记录今日求职进展',type:'normal'}]},
    {id:'reskill',emoji:'🖥️',name:'自学转行',days:'持续',targetDays:0,desc:'每天稳步积累，转型场景',category:'学习',
     habits:[{name:'学习新技能 1小时',type:'normal'},{name:'完成一个小练习或项目',type:'normal'},{name:'阅读技术文章/教程',type:'normal'},{name:'记录今日所学知识点',type:'normal'},{name:'参与社区/论坛讨论',type:'normal'}]},
    {id:'savings',emoji:'💰',name:'存下第一桶金',days:'持续',targetDays:0,desc:'建立消费自律，记录每笔支出',category:'生活',
     habits:[{name:'记录今日支出',type:'expense'},{name:'今天没有冲动消费',type:'normal'},{name:'带自己的午餐/减少外卖',type:'normal'},{name:'查看本月预算执行情况',type:'normal'},{name:'学习一个理财知识',type:'normal'}]},
    {id:'recovery',emoji:'🌱',name:'走出低谷期',days:'持续',targetDays:0,desc:'每天一小步，找回状态',category:'健康',
     habits:[{name:'每周公园徒步一次',type:'normal'},{name:'每周与朋友深度谈话一次',type:'normal'},{name:'记录今日感恩的一件事',type:'normal'},{name:'完成一件让自己有成就感的小事',type:'normal'},{name:'保证7小时睡眠',type:'normal'}]},
    {id:'new_city',emoji:'🗺️',name:'独自在新城市',days:'持续',targetDays:0,desc:'适应新环境，主动建立连接',category:'社交',
     habits:[{name:'探索一个新地标或餐厅（每周）',type:'normal'},{name:'和一个新认识的人交流',type:'normal'},{name:'记录城市探索日记',type:'normal'},{name:'加入一个本地兴趣社群',type:'normal'}]},
    {id:'fitness',emoji:'🏃',name:'健身计划',days:'持续',targetDays:0,desc:'从生活细节入手，建立健康基础',category:'健康',
     habits:[{name:'每日步数 8000步',type:'normal'},{name:'喝水 2L',type:'normal'},{name:'运动 30分钟',type:'normal'},{name:'健康饮食（少油少糖）',type:'normal'},{name:'保证7小时睡眠',type:'normal'}]},
  ]
};

const DEFAULT_CATEGORIES=['健康','学习','社交','工作','生活'];
const STORAGE_KEY='habit_tracker_v2';

function dateStr(d){d=d||new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayStr(){return dateStr()}
function yesterdayStr(){const d=new Date();d.setDate(d.getDate()-1);return dateStr(d)}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function loadData(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}}catch{return{}}}
function saveData(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}

function initData(){
  const r=loadData();
  return{
    habits:(r.habits||[]).map(h=>({bestStreak:0,...h})),
    categories:r.categories||[...DEFAULT_CATEGORIES],
    records:r.records||{},notes:r.notes||{},
    expenses:r.expenses||{},expenseBudget:r.expenseBudget||0,
    lastVisit:r.lastVisit||todayStr(),lastSummaryMonth:r.lastSummaryMonth||''
  };
}

function checkDayReset(data){
  const today=todayStr();
  if(data.lastVisit===today)return data;
  const ydayRec=data.records[yesterdayStr()]||{};
  data.habits=data.habits.map(h=>{
    const ns=ydayRec[h.id]?(h.streak||0)+1:0;
    return{...h,streak:ns,bestStreak:Math.max(h.bestStreak||0,ns)};
  });
  const lm=(data.lastVisit||'').slice(0,7),tm=today.slice(0,7);
  if(lm&&lm!==tm&&lm!==data.lastSummaryMonth)data.pendingSummaryMonth=lm;
  [data.records,data.notes,data.expenses].forEach(obj=>{
    const keys=Object.keys(obj).sort();
    while(keys.length>90)delete obj[keys.shift()];
  });
  data.lastVisit=today;
  if(!data.records[today])data.records[today]={};
  saveData(data);return data;
}

let appData=checkDayReset(initData());
let activeFilter=null;

// ── Render Today ──
function renderDate(){
  const d=new Date(),days=['日','一','二','三','四','五','六'];
  document.getElementById('today-date').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${days[d.getDay()]}`;
}

function renderProgressRing(){
  const card=document.getElementById('progress-ring-card'),total=appData.habits.length;
  if(!total){card.style.display='none';return}
  card.style.display='';
  const rec=appData.records[todayStr()]||{},done=appData.habits.filter(h=>rec[h.id]).length;
  const offset=251.2*(1-done/total);
  document.getElementById('ring-arc').style.strokeDashoffset=offset;
  document.getElementById('ring-count-text').textContent=`${done}/${total}`;
  document.getElementById('ring-stats-done').textContent=`${done} 个完成`;
  document.getElementById('ring-stats-todo').textContent=`${total-done} 个待完成`;
}

function renderFilterBar(){
  const bar=document.getElementById('filter-bar');
  const usedCats=[...new Set(appData.habits.map(h=>h.category||'生活'))];
  if(usedCats.length<=1){bar.innerHTML='';return}
  bar.innerHTML=[null,...usedCats].map(c=>`<button class="filter-chip${activeFilter===c?' active':''}" data-filter="${c===null?'':c}">${c===null?'全部':c}</button>`).join('');
}

function getDayProgress(h){
  if(!h.startDate||!h.targetDays)return null;
  const ms=new Date()-new Date(h.startDate+'T00:00:00');
  const day=Math.min(h.targetDays,Math.floor(ms/86400000)+1);
  return{current:Math.max(1,day),total:h.targetDays,complete:day>=h.targetDays};
}

function renderHabits(){
  const container=document.getElementById('habit-list');
  container.innerHTML='';
  let habits=appData.habits;
  if(activeFilter)habits=habits.filter(h=>(h.category||'生活')===activeFilter);
  if(!habits.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">${appData.habits.length===0?'🌱':'🔍'}</div>${appData.habits.length===0?'还没有习惯，添加第一个或从模版库导入 👆':'该分类暂无习惯'}</div>`;
    return;
  }
  const groups={};
  habits.forEach(h=>{const cat=h.category||'生活';if(!groups[cat])groups[cat]=[];groups[cat].push(h)});
  const today=todayStr(),rec=appData.records[today]||{},notes=appData.notes[today]||{};

  Object.entries(groups).forEach(([cat,list])=>{
    const done=list.filter(h=>rec[h.id]).length;
    const groupEl=document.createElement('div');
    groupEl.className='category-group';
    groupEl.innerHTML=`<div class="category-header" data-cat="${escapeHtml(cat)}"><div class="category-header-left"><span class="category-arrow">▼</span><span class="category-name">${escapeHtml(cat)}</span><span class="category-count">${done}/${list.length}</span></div></div><div class="category-body" id="catbody-${escapeHtml(cat)}"></div>`;
    container.appendChild(groupEl);
    const body=document.getElementById('catbody-'+escapeHtml(cat));

    list.forEach(h=>{
      const isDone=!!rec[h.id],note=notes[h.id]||'';
      const isExpense=h.type==='expense';
      const hasNote=note.length>0||isExpense;
      const dp=getDayProgress(h);

      // Challenge info row
      let challengeHtml='';
      if(dp){
        const daysSinceStart=Math.floor((new Date()-new Date(h.startDate+'T00:00:00'))/86400000);
        const failed=!dp.complete&&(h.streak||0)===0&&daysSinceStart>0;
        challengeHtml=`<div class="challenge-info-row">
          <span class="day-badge${dp.complete?' complete':''}">
            ${dp.complete?'🏆':'📅'} 第 ${dp.current} / ${dp.total} 天
          </span>
          ${dp.complete
            ?`<button class="cert-link-btn" data-action="cert" data-challenge="${h.challengeId}">查看证书 🎉</button>`
            :failed
              ?`<button class="restart-link-btn" data-action="restart" data-challenge="${h.challengeId}">↺ 重新开始</button>`
              :''}
        </div>`;
      }

      let noteAreaHtml='';
      if(isExpense){
        const expVal=appData.expenses[today]||'',monthly=getMonthlyExpense();
        noteAreaHtml=`<div class="habit-note-area${isDone?' open':''}" data-note-area="${h.id}">
          <div class="note-label">今日备忘（可选）</div>
          <textarea class="note-textarea" data-note-input="${h.id}" placeholder="今天消费了什么…">${escapeHtml(note)}</textarea>
          <div class="expense-row"><span class="expense-label">今日支出 ¥</span><input class="expense-input" type="number" min="0" step="0.01" data-expense-input="${h.id}" value="${expVal}" placeholder="0.00"/></div>
          <div class="expense-monthly">本月累计支出：<span>¥${monthly.toFixed(2)}</span></div>
          <button class="note-save-btn" data-action="save-note" data-id="${h.id}">保存</button>
        </div>`;
      } else {
        noteAreaHtml=`<div class="habit-note-area" data-note-area="${h.id}">
          <div class="note-label">今日备忘</div>
          <textarea class="note-textarea" data-note-input="${h.id}" placeholder="例：今天完成了什么…">${escapeHtml(note)}</textarea>
          <button class="note-save-btn" data-action="save-note" data-id="${h.id}">保存备忘</button>
        </div>`;
      }

      const card=document.createElement('div');
      card.className='habit-card'+(isDone?' done':'');
      card.dataset.id=h.id;
      card.innerHTML=`<div class="habit-row">
        <div class="habit-check" data-action="check" data-id="${h.id}"><span class="check-icon">✓</span></div>
        <span class="habit-name">${escapeHtml(h.name)}</span>
        ${h.streak>0?`<span class="habit-streak">🔥${h.streak}天</span>`:''}
        <button class="habit-note-btn${hasNote?' has-note':''}" data-action="note" data-id="${h.id}">✏️<span class="note-dot"></span></button>
        <button class="habit-delete" data-action="delete" data-id="${h.id}">×</button>
      </div>
      ${challengeHtml}
      ${noteAreaHtml}`;
      body.appendChild(card);
    });
  });
}

  category=category||'生活';
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);

  appData.habits=appData.habits.filter(h=>h.id!==id);

  Object.values(appData.notes).forEach(r=>delete r[id]);

}

function saveNote(id){
  const today=todayStr(),ta=document.querySelector(`[data-note-input="${id}"]`);

function getMonthlyExpense(prefix){prefix=prefix||todayStr().slice(0,7);return Object.entries(appData.expenses).filter(([k])=>k.startsWith(prefix)).reduce((s,[,v])=>s+(parseFloat(v)||0),0)}

function doImport(tpl,indices,isChallenge){
  const cat=tpl.category||'生活';
  if(!appData.categories.includes(cat))appData.categories.push(cat);
  let imported=0;
  indices.forEach(idx=>{
    const tplH=tpl.habits[idx];
    if(!appData.habits.find(h=>h.name===tplH.name)){
      const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6)+imported;
      const habit={id,name:tplH.name,streak:0,bestStreak:0,category:cat,type:tplH.type||'normal'};
      if(isChallenge&&tpl.targetDays>0){habit.challengeId=tpl.id;habit.startDate=todayStr();habit.targetDays=tpl.targetDays}
      appData.habits.push(habit);imported++;
    }
  });
  if(imported>0&&appData.habits.some(h=>h.type==='expense')&&!appData.expenseBudget){
    const b=prompt('检测到记账习惯，设置本月预算（元），填 0 跳过：');const v=parseFloat(b);
    if(!isNaN(v)&&v>0)appData.expenseBudget=v;
  }
  saveData(appData);switchTab('today');render();
  if(!isChallenge)showToast(imported>0?`已导入 ${imported} 个习惯 ✅`:'所选习惯已存在，未重复导入');
}

function renderCompletionChart(){
  const c=document.getElementById('chart-container');if(!c)return;
  const total=appData.habits.length;
  if(!total){c.innerHTML='<div class="section-empty">添加习惯后开始记录趋势 📊</div>';return}
  const today=new Date(),todayKey=dateStr(today),dow=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dow===0?6:dow-1));
  const tw=Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return dateStr(d)});
  const lw=tw.map(d=>{const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()-7);return dateStr(dt)});
  const rate=k=>{if(k>todayKey)return null;const rec=appData.records[k]||{};return appData.habits.filter(h=>rec[h.id]).length/total};
  const W=300,H=110,pL=30,pR=10,pT=10,pB=30,cW=W-pL-pR,cH=H-pT-pB,xs=cW/6;
  const xp=i=>(pL+i*xs).toFixed(1),yp=r=>(pT+(1-r)*cH).toFixed(1);
  function poly(rates){return rates.map((r,i)=>r!==null?`${xp(i)},${yp(r)}`:null).filter(Boolean).join(' ')}
  function dots(rates,col){return rates.map((r,i)=>r!==null?`<circle cx="${xp(i)}" cy="${yp(r)}" r="3.5" fill="${col}"/>`:'').join('')}
  const gl=[0,.5,1].map(r=>`<line x1="${pL}" y1="${yp(r)}" x2="${W-pR}" y2="${yp(r)}" stroke="var(--border)" stroke-width="1"/>`).join('');
  const xl=['一','二','三','四','五','六','日'].map((l,i)=>`<text x="${xp(i)}" y="${H-4}" text-anchor="middle" font-size="10" fill="var(--sub)">周${l}</text>`).join('');
  const yl=[0,50,100].map(v=>`<text x="${pL-4}" y="${yp(v/100)+4}" text-anchor="end" font-size="9" fill="var(--sub)">${v}%</text>`).join('');
  const twR=tw.map(rate),lwR=lw.map(rate);
  c.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible;display:block">${gl}
    <polyline points="${poly(lwR)}" fill="none" stroke="var(--sub)" stroke-width="2" stroke-dasharray="5 3" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots(lwR,'var(--sub)')}
    <polyline points="${poly(twR)}" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots(twR,'var(--primary)')}${xl}${yl}</svg>
    <div class="chart-legend">
      <span class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--primary)" stroke-width="2.5"/></svg>本周</span>
      <span class="legend-item"><svg width="22" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="var(--sub)" stroke-width="2" stroke-dasharray="5 3"/></svg>上周</span>
    </div>`;
}

function renderCalendar(){
  const container=document.getElementById('calendar-container');container.innerHTML='';
  const today=new Date(),todayKey=dateStr(today),total=appData.habits.length;
  const start=new Date(today);start.setDate(start.getDate()-89);start.setDate(start.getDate()-start.getDay());
  const cur=new Date(start);
  while(cur<=today){
    const week=document.createElement('div');week.className='cal-week';
    for(let i=0;i<7;i++){
      const key=dateStr(cur),cell=document.createElement('div');
      cell.className='cal-day';cell.dataset.date=key;cell.title=key;
      if(cur<=today){const rec=appData.records[key]||{},done=Object.values(rec).filter(Boolean).length;if(total>0&&done>0){const rate=done/total;cell.classList.add(rate>=1?'rate-full':rate>=.5?'rate-mid':'rate-low')}}
      else{cell.style.opacity='0';cell.style.pointerEvents='none'}
      if(key===todayKey)cell.classList.add('today-cell');
      week.appendChild(cell);cur.setDate(cur.getDate()+1);
    }
    container.appendChild(week);
  }
}


function renderExpenseSummary(){
  const sec=document.getElementById('expense-summary-section');if(!sec)return;
  const hasE=appData.habits.some(h=>h.type==='expense');if(!hasE){sec.innerHTML='';return}
  const prefix=todayStr().slice(0,7),spent=getMonthlyExpense(prefix),budget=appData.expenseBudget||0;
  const pct=budget>0?Math.min(100,Math.round(spent/budget*100)):0,over=budget>0&&spent>budget,rem=budget-spent;
  const rd=Object.keys(appData.expenses).filter(k=>k.startsWith(prefix)).length;
  const barHtml=budget>0?`<div class="expense-bar-bg"><div class="expense-bar-fill${over?' over':''}" style="width:${pct}%"></div></div><div class="expense-detail-row"><span>${over?`⚠️ 已超支 ¥${Math.abs(rem).toFixed(0)}`:`还剩 ¥${rem.toFixed(0)}`}</span><span>已记录 ${rd} 天</span></div>`:`<div class="expense-detail-row"><span>已记录 ${rd} 天</span></div>`;
  sec.innerHTML=`<div class="my-section-card"><div class="my-section-title">💰 本月记账</div><div class="expense-summary-inner"><div class="expense-amount-row"><span class="expense-spent">¥${spent.toFixed(0)}</span><span class="expense-budget-label">${budget>0?` / ¥${budget.toFixed(0)} 预算`:' 本月支出'}</span></div>${barHtml}<button class="budget-btn" onclick="promptBudget()">${budget>0?'修改预算':'设置预算'}</button></div></div>`;
}

function promptBudget(){const cur=appData.expenseBudget||'',inp=prompt('请输入本月预算（元）：',cur);if(inp===null)return;const v=parseFloat(inp);if(!isNaN(v)&&v>=0){appData.expenseBudget=v;saveData(appData);renderExpenseSummary()}}

function buildMonthlySummary(ym){
  const mr=Object.entries(appData.records).filter(([d])=>d.startsWith(ym));
  let totalCI=0;const cd=new Set();
  mr.forEach(([d,rec])=>{const done=Object.values(rec).filter(Boolean).length;totalCI+=done;if(done>0)cd.add(d)});
  const avg=cd.size>0?(totalCI/cd.size).toFixed(1):'0.0';
  const ms=appData.habits.reduce((m,h)=>Math.max(m,h.bestStreak||0),0);
  const ms2=getMonthlyExpense(ym);
  return{ym,totalCI,completedDays:cd.size,avg,maxStreak:ms,monthSpent:ms2,hasExpense:appData.habits.some(h=>h.type==='expense')&&ms2>0};
}

function showMonthlySummary(ym){
  const s=buildMonthlySummary(ym),[y,m]=ym.split('-');
  document.getElementById('summary-body').innerHTML=`<div class="summary-gradient-card"><div class="summary-month-title">📅 ${y}年${parseInt(m)}月 · 月度总结</div><div class="summary-items">
    <div class="summary-item">✅ 累计打卡 <b>${s.totalCI}</b> 次</div>
    <div class="summary-item">📆 共 <b>${s.completedDays}</b> 天有记录，平均每天 <b>${s.avg}</b> 次</div>
    <div class="summary-item">🔥 最长连续 <b>${s.maxStreak}</b> 天</div>
    ${s.hasExpense?`<div class="summary-item">💰 本月支出 <b>¥${s.monthSpent.toFixed(0)}</b>${appData.expenseBudget?` / ¥${appData.expenseBudget} 预算`:''}</div>`:''}
  </div></div>`;
  document.getElementById('summary-overlay').classList.add('open');
}

function openDayDetail(dateKey){
  const rec=appData.records[dateKey]||{},notes=appData.notes[dateKey]||{};
  const d=new Date(dateKey+'T00:00:00'),days=['日','一','二','三','四','五','六'];
  document.getElementById('day-detail-title').textContent=`${d.getMonth()+1}月${d.getDate()}日 星期${days[d.getDay()]}`;
  const body=document.getElementById('day-detail-body');
  if(!appData.habits.length){body.innerHTML='<div style="color:var(--sub);text-align:center;padding:20px">暂无习惯数据</div>';return}
  body.innerHTML=appData.habits.map(h=>{
    const done=!!rec[h.id],note=notes[h.id]||'';
    const expStr=h.type==='expense'&&appData.expenses[dateKey]?`💰 支出 ¥${parseFloat(appData.expenses[dateKey]).toFixed(2)}`:'';
    return`<div class="day-detail-item"><div class="day-detail-row"><span>${done?'✅':'⬜'}</span><span class="day-detail-name">${escapeHtml(h.name)}</span></div>${note?`<div class="day-detail-note">📝 ${escapeHtml(note)}</div>`:''}${expStr?`<div class="day-detail-note">${expStr}</div>`:''}</div>`;
  }).join('');
  document.getElementById('day-detail-overlay').classList.add('open');
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:999px;font-size:14px;z-index:9000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;';document.body.appendChild(t)}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0'},2200);
}

function fireConfetti(){
  const w=document.getElementById('confetti-wrapper');w.innerHTML='';
  const colors=['#6C63FF','#a78bfa','#f97316','#22c55e','#facc15','#ec4899'];
  for(let i=0;i<60;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.background=colors[Math.floor(Math.random()*colors.length)];const s=(8+Math.random()*6)+'px';el.style.width=s;el.style.height=s;el.style.borderRadius=Math.random()>.5?'50%':'2px';el.style.animationDuration=(1.5+Math.random()*1.5)+'s';el.style.animationDelay=(Math.random()*.6)+'s';w.appendChild(el)}
  setTimeout(()=>{w.innerHTML=''},3500);
}

function fireCheckParticles(el){
  const rect=el.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const colors=['#6C63FF','#a78bfa','#f97316','#22c55e','#facc15','#ec4899'];
  const w=document.getElementById('confetti-wrapper');
  for(let i=0;i<8;i++){const p=document.createElement('div');p.className='check-particle';const a=(i/8)*Math.PI*2,d=28+Math.random()*18;p.style.left=cx+'px';p.style.top=cy+'px';p.style.setProperty('--dx',Math.cos(a)*d+'px');p.style.setProperty('--dy',Math.sin(a)*d+'px');p.style.background=colors[Math.floor(Math.random()*colors.length)];w.appendChild(p);setTimeout(()=>p.remove(),700)}
}

function toggleTheme(){
  const html=document.documentElement,cur=html.getAttribute('data-theme'),sys=window.matchMedia('(prefers-color-scheme:dark)').matches;
  let next=!cur?(sys?'light':'dark'):cur==='dark'?'light':null;
  if(next){html.setAttribute('data-theme',next);localStorage.setItem('themeOverride',next)}
  else{html.removeAttribute('data-theme');localStorage.removeItem('themeOverride')}
  updateThemeBtn();
}
function updateThemeBtn(){const btn=document.getElementById('theme-toggle');if(!btn)return;const t=document.documentElement.getAttribute('data-theme'),s=window.matchMedia('(prefers-color-scheme:dark)').matches;btn.textContent=(t==='dark'||(!t&&s))?'☀️':'🌙'}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  ['today','templates','mine'].forEach(t=>document.getElementById('page-'+t).classList.toggle('active',t===tab));
}

function createNewCategory(sel){
  const name=prompt('请输入新分类名称：');if(!name||!name.trim()){sel.value=appData.categories[0]||'生活';return}
  const tr=name.trim();if(!appData.categories.includes(tr)){appData.categories.push(tr);saveData(appData);renderCatSelect()}
  document.getElementById('cat-select').value=tr;
}

// ── Events ──
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{const tab=btn.dataset.tab;switchTab(tab);if(tab==='mine')renderMine();if(tab==='templates'){renderTemplates('challenge');renderTemplates('scene')}}));
document.querySelectorAll('.sub-tab-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.sub-tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const s=btn.dataset.sub;document.getElementById('tpl-grid-challenge').style.display=s==='challenge'?'':'none';document.getElementById('tpl-grid-scene').style.display=s==='scene'?'':'none'}));


document.getElementById('habit-list').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const{action,id,challenge}=el.dataset;
  if(action==='check')toggleHabit(id);
  else if(action==='delete'){if(confirm('确认删除这个习惯？'))deleteHabit(id)}
  else if(action==='note')toggleNoteArea(id);
  else if(action==='save-note')saveNote(id);
  else if(action==='restart')restartChallenge(challenge);
  else if(action==='cert')showCertificate(challenge);
});
document.getElementById('habit-list').addEventListener('click',e=>{const h=e.target.closest('.category-header');if(h)h.closest('.category-group').classList.toggle('collapsed')});
document.getElementById('filter-bar').addEventListener('click',e=>{const c=e.target.closest('.filter-chip');if(!c)return;activeFilter=c.dataset.filter||null;render()});

document.getElementById('add-btn').addEventListener('click',()=>{
  const inp=document.getElementById('habit-input'),sel=document.getElementById('cat-select');
  if(sel.value==='__new__'){createNewCategory(sel);return}
  addHabit(inp.value,sel.value);inp.value='';inp.focus();
});
document.getElementById('habit-input').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;const sel=document.getElementById('cat-select');
  if(sel.value==='__new__'){createNewCategory(sel);return}
  addHabit(e.target.value,sel.value);e.target.value='';
});
document.getElementById('cat-select').addEventListener('change',function(){if(this.value==='__new__')createNewCategory(this)});

document.getElementById('tpl-habit-list').addEventListener('click',e=>{const it=e.target.closest('.tpl-habit-item');if(!it)return;it.classList.toggle('selected');updateImportBtn()});
document.getElementById('tpl-toggle-all').addEventListener('click',()=>{const items=document.querySelectorAll('.tpl-habit-item'),allSel=document.querySelectorAll('.tpl-habit-item.selected').length===items.length;items.forEach(it=>it.classList.toggle('selected',!allSel));updateImportBtn()});
document.getElementById('tpl-import-btn').addEventListener('click',importSelected);
document.getElementById('tpl-close-btn').addEventListener('click',()=>document.getElementById('tpl-overlay').classList.remove('open'));
document.getElementById('tpl-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('tpl-overlay').classList.remove('open')});

document.getElementById('calendar-container').addEventListener('click',e=>{const c=e.target.closest('.cal-day');if(c&&c.dataset.date)openDayDetail(c.dataset.date)});
document.getElementById('day-detail-close').addEventListener('click',()=>document.getElementById('day-detail-overlay').classList.remove('open'));
document.getElementById('day-detail-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('day-detail-overlay').classList.remove('open')});
document.getElementById('summary-close-btn').addEventListener('click',()=>document.getElementById('summary-overlay').classList.remove('open'));
document.getElementById('summary-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('summary-overlay').classList.remove('open')});

// ── Init ──
render();updateThemeBtn();
if(appData.pendingSummaryMonth){const m=appData.pendingSummaryMonth;delete appData.pendingSummaryMonth;appData.lastSummaryMonth=m;saveData(appData);setTimeout(()=>showMonthlySummary(m),800)}
</script>
</body>
